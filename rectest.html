<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#000; color:#0f0; font-family:monospace; padding:20px; }
button { display:block; width:100%; padding:16px; margin:8px 0; background:#001a00; color:#0f0; border:1px solid #0f0; font-family:monospace; font-size:14px; cursor:pointer; }
#log { margin-top:16px; font-size:11px; line-height:1.8; color:#888; }
canvas { display:block; width:100%; height:120px; background:#111; margin:8px 0; }
</style>
</head>
<body>
<h3 style="color:#0f0;margin-bottom:12px">RECORD TEST</h3>
<canvas id="c"></canvas>
<button onclick="testCapture()">1. TEST captureStream</button>
<button onclick="testRecord()">2. TEST MediaRecorder</button>
<button onclick="testSave()">3. SAVE (if recorded)</button>
<div id="log"></div>
<script>
var blob = null;
var chunks = [];
var mr = null;

function log(t, color) {
  var d = document.createElement('div');
  d.textContent = '> ' + t;
  d.style.color = color || '#888';
  document.getElementById('log').appendChild(d);
}

// Animate canvas so it has content
var ctx = document.getElementById('c').getContext('2d');
var c = document.getElementById('c');
c.width = 320; c.height = 120;
var t = 0;
function draw() {
  requestAnimationFrame(draw);
  ctx.fillStyle = '#000';
  ctx.fillRect(0,0,320,120);
  ctx.fillStyle = '#00ff41';
  ctx.fillRect(t % 300, 40, 40, 40);
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.fillText('frame ' + Math.floor(t), 10, 20);
  t += 2;
}
draw();

function testCapture() {
  log('testing captureStream...');
  try {
    if (!c.captureStream) { log('captureStream: NOT SUPPORTED', '#f44'); return; }
    var s = c.captureStream(24);
    log('captureStream: OK — tracks: ' + s.getTracks().length, '#0f0');
    log('track kind: ' + (s.getTracks()[0] ? s.getTracks()[0].kind : 'none'), '#0f0');
  } catch(e) { log('captureStream error: ' + e.message, '#f44'); }
}

function testRecord() {
  log('testing MediaRecorder...');
  try {
    if (!c.captureStream) { log('captureStream not available', '#f44'); return; }
    var stream = c.captureStream(24);
    
    var types = ['video/mp4;codecs=avc1','video/mp4','video/webm;codecs=vp9','video/webm'];
    var supported = types.filter(t => MediaRecorder.isTypeSupported(t));
    log('supported types: ' + (supported.length ? supported.join(', ') : 'NONE'), supported.length ? '#0f0' : '#f44');
    
    var opts = supported.length ? {mimeType: supported[0]} : {};
    log('using: ' + (supported[0] || 'default'));
    
    chunks = [];
    mr = new MediaRecorder(stream, opts);
    mr.ondataavailable = function(e) {
      log('chunk: ' + e.data.size + ' bytes', e.data.size > 0 ? '#0f0' : '#f44');
      if (e.data.size > 0) chunks.push(e.data);
    };
    mr.onstop = function() {
      log('stopped. chunks: ' + chunks.length, '#0f0');
      if (chunks.length > 0) {
        blob = new Blob(chunks, {type: supported[0] || 'video/mp4'});
        log('blob size: ' + blob.size + ' bytes', blob.size > 0 ? '#0f0' : '#f44');
      } else {
        log('NO DATA — recording failed', '#f44');
      }
    };
    mr.start(500);
    log('recording started...', '#0f0');
    setTimeout(function() {
      mr.stop();
      log('stop called', '#0f0');
    }, 3000);
  } catch(e) { log('MediaRecorder error: ' + e.message, '#f44'); }
}

function testSave() {
  if (!blob || blob.size === 0) { log('no blob to save', '#f44'); return; }
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = 'test_' + Date.now() + '.mp4';
  a.click();
  log('save triggered', '#0f0');
}
</script>
</body>
</html>
